[build]
  command       = "npm run build"
  publish       = "dist"
  ignore        = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!README.md' ':!CONTRIBUTING.md'"

[build.environment]
  NODE_VERSION  = "20"
  NPM_VERSION   = "10"
  NODE_ENV      = "production"

# ── SPA routing — redirect all routes to index.html ──
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy   = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:;"

# ── Cache static assets aggressively ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Never cache HTML ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Branch deploy previews ──
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
